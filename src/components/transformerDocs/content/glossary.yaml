transform:
  label: transform
  en: Your custom transformer function; called each physics step with input, dt, params, state, and api.
  de: Deine Transformer-Funktion; wird in jedem Simulationsschritt mit input, dt, params, state und api aufgerufen.
TransformInput:
  label: TransformInput
  en: "Input snapshot: pose, velocity, environment, actions, optional target, and more."
  de: "Eingabedaten: Position, Geschwindigkeit, Umgebung, Steuerwerte, optional ein Ziel usw."
TransformOutput:
  label: TransformOutput
  en: "Return type: optional force, impulse, torque, linvel, rotation deltas, color, or {}."
  de: "Rückgabe: optional force, impulse, torque, linvel, Drehung, color oder {}."
TransformerRuntimeApi:
  label: TransformerRuntimeApi
  en: "Frozen helper object (api): vector math, raycasts, getAction, world queries, clamp, log, visualize."
  de: "Hilfsfunktionen (api): Vektoren, Strahlen, getAction, Abfragen, clamp, log, visualize."
dt:
  label: dt
  en: Simulation timestep in seconds for this physics tick; use with state for timers.
  de: Dauer eines Simulationsschritts in Sekunden; mit state für Timer nutzen.
params:
  label: params
  en: JSON parameters from the transformer config (numbers, booleans, nested objects).
  de: Einstellungen aus der Transformer-Konfiguration (Zahlen, Schalter, verschachtelte Objekte).
state:
  label: state
  en: Mutable object for this transformer instance; kept between frames until the transformer is rebuilt.
  de: Speicher nur für diesen Transformer; bleibt zwischen Schritten, bis neu geladen.
input_object:
  label: input
  en: TransformInput for this entity and tick; you may mutate input.actions before downstream transformers.
  de: Eingabedaten für dieses Objekt; du darfst input.actions vor späteren Transformern ändern.
api:
  label: api
  en: Shorthand for TransformerRuntimeApi (fifth parameter).
  de: Kurzname für die Hilfsfunktionen (fünfter Parameter).
actions:
  label: actions
  en: Semantic control values (e.g. throttle, steer_left) from the input preset or your code.
  de: Steuerwerte (z. B. throttle, steer_left) vom input-Preset oder deinem Code.
throttle:
  label: throttle
  en: "Common car action: forward input (0–1 typical). Read by car2."
  de: "Typische Auto-Steuerung: Gas (meist 0–1). Liest car2."
brake:
  label: brake
  en: "Common car action: braking input. Read by car2."
  de: "Typische Auto-Steuerung: Bremsen. Liest car2."
steer_left:
  label: steer_left
  en: "Car action: steer left (−1..1 typical). Read by car2."
  de: "Auto-Steuerung: nach links lenken (typisch −1..1). Liest car2."
steer_right:
  label: steer_right
  en: "Car action: steer right (−1..1 typical). Read by car2."
  de: "Auto-Steuerung: nach rechts lenken (typisch −1..1). Liest car2."
forward_action:
  label: forward
  en: Example action name in person/input mappings; exact name comes from your input preset.
  de: Beispiel für einen Steuerungsnamen; der echte Name steht in deiner Tastenbelegung.
position:
  label: position
  en: World position [x, y, z] in metres on TransformInput.
  de: Welt-Position [x, y, z] in Metern auf TransformInput.
rotation:
  label: rotation
  en: Orientation as Euler angles [x, y, z] in radians.
  de: Ausrichtung als Euler-Winkel [x, y, z] in Radiant.
velocity:
  label: velocity
  en: World linear velocity in m/s; Vec3 tuple.
  de: Lineare Geschwindigkeit in m/s; Tupel mit drei Zahlen.
angularVelocity:
  label: angularVelocity
  en: World angular velocity in rad/s; Vec3 tuple.
  de: Winkelgeschwindigkeit in rad/s; Tupel mit drei Zahlen.
Vec3:
  label: Vec3
  en: Three-number tuple [x, y, z] for points or directions; use api.vec helpers (no methods on the tuple).
  de: Drei Zahlen [x, y, z] für Punkte oder Richtungen; nutze api.vec (keine Methoden am Tupel).
environment:
  label: environment
  en: "Contact and ground data: grounded, normals, touching, optional supportVelocity."
  de: "Kontakt- und Bodendaten: Boden, Normalen, Berührung, optional supportVelocity."
EnvironmentState:
  label: EnvironmentState
  en: Type of input.environment.
  de: Typ von input.environment.
isGrounded:
  label: isGrounded
  en: True when resting on counted ground surfaces.
  de: Wahr, wenn das Objekt auf dem Boden steht.
groundNormal:
  label: groundNormal
  en: Surface normal at the main ground contact.
  de: Normalenvektor der Bodenfläche am Kontakt.
isTouchingObject:
  label: isTouchingObject
  en: True when touching any other collider (car2 requires this for drive output).
  de: Wahr, wenn das Objekt ein anderes berührt (car2 fährt nur dann).
supportVelocity:
  label: supportVelocity
  en: Velocity of the surface you stand on (moving platforms); missing in the air.
  de: Geschwindigkeit der Fläche unter dir (bewegte Plattform); in der Luft fehlend.
target:
  label: target
  en: Optional movement goal (pose + speed) from targetPoseInput, follow, wanderer, etc.
  de: Optionales Bewegungsziel (Pose + speed) von targetPoseInput, follow, wanderer usw.
force:
  label: force
  en: Continuous force vector (N) for this integration step.
  de: Dauerhafte Kraft (N) in diesem Simulationsschritt.
impulse:
  label: impulse
  en: Instantaneous impulse (N·s).
  de: Kurzer Impuls (N·s).
torque:
  label: torque
  en: Continuous torque for this step.
  de: Drehmoment in diesem Schritt.
linvel:
  label: linvel
  en: Override linear velocity directly — use sparingly.
  de: Lineare Geschwindigkeit direkt setzen — sparsam nutzen.
addRotation:
  label: addRotation
  en: Euler delta applied after the step (radians).
  de: Euler-Delta nach dem Schritt (Radiant).
color:
  label: color
  en: Optional mesh tint [r, g, b] with channels 0–1.
  de: Optionale Mesh-Farbe [r, g, b], Kanäle 0–1.
car2:
  label: car2
  en: Built-in vehicle preset; reads throttle, brake, steer_* actions.
  de: Eingebautes Auto; liest throttle, brake, steer_*.
input_preset:
  label: input
  en: Preset that maps keyboard/wheel into semantic actions on input.actions.
  de: "Preset: Tastatur und Mausrad → Steuerwerte in input.actions."
custom_transformer:
  label: custom
  en: Transformer type authored as JavaScript (compiled once).
  de: Eigener Code als JavaScript (wird einmal kompiliert).
Monaco:
  label: Monaco
  en: In-browser code editor for scripts and custom transformers.
  de: Code-Editor im Browser für Skripte und eigene Transformer.
IntelliSense:
  label: IntelliSense
  en: Editor autocompletion and signatures from type declarations.
  de: Vervollständigung und Signaturen aus Typ-Deklarationen.
JSDoc:
  label: JSDoc
  en: Comment tags such as @param that improve editor tooling.
  de: Kommentar-Tags wie @param für bessere Editor-Hilfe.
priority:
  label: priority
  en: "Chain order: lower numbers run earlier."
  de: "Reihenfolge in der Kette: kleinere Zahl läuft früher."
getAction:
  label: getAction(input, name)
  en: Reads input.actions[name], default 0.
  de: Liest input.actions[name]; fehlt der Wert, dann 0.
vec:
  label: api.vec
  en: "Vector helpers on api: add, scale, dot, angles, projectOntoPlane, offsetAlong, …"
  de: "Vektor-Helfer auf api: add, scale, dot, Winkel, projectOntoPlane, offsetAlong, …"
raycast:
  label: api.raycast
  en: Single physics ray; returns hit, distance, entityId.
  de: Einzelner Strahl in der Physik; liefert hit, distance, entityId.
raycastSpread:
  label: api.raycastSpread
  en: Several parallel rays spread sideways; closest hit wins.
  de: Mehrere parallele Strahlen; der nächste Treffer zählt.
offsetAlong:
  label: api.vec.offsetAlong
  en: Point at origin + direction * distance (e.g. sensor in front of the car).
  de: Punkt bei origin + direction * distance (z. B. Sensor vor dem Auto).
projectOntoPlane:
  label: api.vec.projectOntoPlane
  en: Flatten a vector onto a plane (horizontal steering on slopes).
  de: Vektor auf eine Ebene projizieren (horizontales Lenken an Hängen).
visualize:
  label: api.visualize
  en: Builder-only numeric overlay (Visualize mode, index 1–16).
  de: "Nur Builder: Zahlen-Overlay (Visualize-Modus, index 1–16)."
visualizeLine:
  label: api.visualizeLine
  en: Builder-only line between two Vec3 points.
  de: "Nur Builder: Linie zwischen zwei Vec3-Punkten."
clamp:
  label: api.clamp
  en: Clamp a number to [min, max] inclusive.
  de: Zahl inklusive auf [min, max] begrenzen.
log:
  label: api.log
  en: Short message in Play mode (snackbar).
  de: Kurze Meldung im Play-Modus (Snackbar).
getWorldPosition:
  label: getWorldPosition
  en: Live world position from physics — fast lookup.
  de: Aktuelle Position aus der Physik — schnelle Abfrage.
getStartPosition:
  label: getStartPosition
  en: Spawn position from world JSON (not live physics).
  de: Startposition aus der Welt-Datei (nicht die live berechnete Physik).
getEntity:
  label: getEntity
  en: Full entity snapshot plus getLivePosition(); heavier than position helpers.
  de: Viele Objektdaten plus getLivePosition(); langsamer als Positions-Helfer.
eval:
  label: eval
  en: Forbidden in custom transformer code (security).
  de: In eigenem Transformer-Code verboten (Sicherheit).
JavaScript:
  label: JavaScript
  en: Language used for custom transformer bodies.
  de: Sprache für den Transformer-Code.
Entity:
  label: entity
  en: World object this transformer is attached to.
  de: Objekt in der Welt, an dem dieser Transformer hängt.
Record:
  label: Record<string, number>
  en: Map from string keys to numbers (the actions object).
  de: Zuordnung Name → Zahl (das actions-Objekt).
new_Date:
  label: new Date()
  en: Wall-clock time; does not follow simulation pause or dt.
  de: Echte Uhrzeit; pausiert nicht mit dem Spiel und folgt nicht dt.
